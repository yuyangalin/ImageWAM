# @package _global_

defaults:
  - override /data: robotwin_omnigen2
  - override /model: imagewam_cache_idm_omnigen2
  - _self_

# dataloading
batch_size: 4
num_workers: 24
prefetch_factor: 2
persistent_workers: true


# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 2
max_steps: null
log_every: 10
save_every: 2500
eval_every: 500

# training
gradient_accumulation_steps: 6
weight_decay: 1e-2
resume: null

wandb:
  enabled: true
  project: imagewam
  name: robotwin_omnigen2_cache_idm
